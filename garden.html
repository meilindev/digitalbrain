<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌱 pixel garden · pomodoro</title>
  <!-- Pixel font (optional, but strongly recommended for retro feel) -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      image-rendering: crisp-edges; /* pixelated scaling */
      image-rendering: pixelated;
      image-rendering: pixelated;
    }

    body {
      background: #E2ECDA;  /* deeper sage */
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #3A5C34;
      line-height: 1.5;
      padding: 1rem;
    }

    /* retro container with pixel border */
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #FDF8EE;  /* warm cream paper */
      border: 4px solid #A8C99E;
      box-shadow: 8px 8px 0 #6A8E5C;
    }

    .header {
      padding: 1.2rem;
      text-align: center;
      background: #F4F7E6;
      border-bottom: 3px solid #A8C99E;
    }

    .back-home {
      display: inline-block;
      background: #E5EFDC;
      border: 2px solid #A8C99E;
      padding: 0.4rem 1rem;
      text-decoration: none;
      font-size: 0.6rem;
      color: #4A6B3F;
      margin-bottom: 0.8rem;
      font-family: inherit;
      box-shadow: 2px 2px 0 #A8C99E;
      transition: 0.05s linear;
    }
    .back-home:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: -0.5px;
      color: #5C824B;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* pixel timer panel */
    .timer-panel {
      background: #F4F1E3;
      margin: 1.5rem;
      padding: 1rem;
      border: 3px solid #A8C99E;
      box-shadow: inset 0 0 0 2px #FEFCF5, 0 4px 0 #6A8E5C;
    }
    .timer-display {
      font-size: 2.2rem;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      background: #2C3E2B;
      color: #CBE5C1;
      padding: 0.6rem;
      letter-spacing: 4px;
      margin-bottom: 1rem;
      border: 2px solid #A8C99E;
    }
    .timer-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .timer-btn {
      background: #E5EFDC;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      padding: 0.5rem 1rem;
      color: #3A5C34;
      cursor: pointer;
      box-shadow: 3px 3px 0 #6A8E5C;
      transition: 0.05s linear;
    }
    .timer-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #6A8E5C;
    }

    /* garden area */
    .garden-section {
      margin: 1.5rem;
    }
    .garden-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      font-size: 0.7rem;
    }
    .reset-garden {
      background: none;
      border: 2px solid #A8C99E;
      padding: 0.3rem 0.8rem;
      font-family: inherit;
      font-size: 0.6rem;
      cursor: pointer;
      color: #5C7A4A;
      box-shadow: 2px 2px 0 #A8C99E;
    }
    .reset-garden:active {
      transform: translate(1px,1px);
      box-shadow: none;
    }

    /* 4x4 pixel grid */
    .garden-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background: #D9E6CF;
      padding: 1rem;
      border: 4px solid #A8C99E;
      margin-bottom: 1rem;
    }
    .plot {
      aspect-ratio: 1 / 1;
      background: #BFD8B0;
      image-rendering: pixelated;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      border: 2px solid #8FAD7D;
      box-shadow: inset 0 0 0 1px #FEFCF5, 2px 2px 0 #6A8E5C;
      transition: 0.05s linear;
    }
    /* pixel plant grows */
    .plot.has-plant {
      background: #AAC99E;
      border: 2px solid #6E8F60;
    }

    /* pixel character sprite (anime girl) */
    .character {
      text-align: center;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }
    .pixel-sprite {
      display: inline-block;
      width: 64px;
      height: 64px;
      background: #FDF8EE;
      image-rendering: pixelated;
      font-size: 3rem;
      filter: drop-shadow(2px 2px 0 #A8C99E);
    }

    .info-text {
      font-size: 0.55rem;
      text-align: center;
      background: #EFEEDE;
      padding: 0.5rem;
      border: 1px solid #A8C99E;
      margin-top: 0.8rem;
    }

    .footer {
      background: #F4F1E3;
      text-align: center;
      padding: 0.8rem;
      font-size: 0.5rem;
      border-top: 3px solid #A8C99E;
      color: #5C7A4A;
    }
    @media (max-width: 550px) {
      .plot { font-size: 1.5rem; }
      .timer-display { font-size: 1.5rem; }
      .timer-btn { font-size: 0.55rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-home">← back home</a>
    <h1>
      <span>🌾</span> POMODORO SEEDLING GARDEN <span>🌸</span>
    </h1>
    <p style="font-size:0.55rem; margin-top:0.5rem;">each pomodoro = one new plant friend 🌿</p>
  </div>

  <!-- TIMER (pixel style) -->
  <div class="timer-panel">
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="timer-buttons">
      <button class="timer-btn" id="startBtn">▶ START</button>
      <button class="timer-btn" id="pauseBtn">⏸ PAUSE</button>
      <button class="timer-btn" id="resetBtn">⟳ RESET</button>
    </div>
  </div>

  <!-- GARDEN + PIXEL ANIME CHARACTER -->
  <div class="garden-section">
    <div class="garden-header">
      <span>🌱 MY PIXEL PLOT</span>
      <button class="reset-garden" id="resetGardenBtn">CLEAR GARDEN</button>
    </div>
    <div class="garden-grid" id="gardenGrid"></div>

    <!-- cute pixel anime girl (emoji + pixel border) -->
    <div class="character">
      <div class="pixel-sprite">
        👧🏻🌼
      </div>
      <div style="font-size:0.5rem; margin-top: 4px;">「 plant keeper ˗ˋˏ ♡ ˎˊ˗ 」</div>
    </div>
    <div class="info-text">
      🎮 each 25min focus = 1 pixel plant grows!<br>
      💾 garden auto-saves — keep nurturing your digital patch.
    </div>
  </div>

  <div class="footer">
    ⚡ pixel mode · sage pastel · grow with intention
  </div>
</div>

<script>
  // ---------- TIMER ----------
  let timeLeft = 25 * 60;
  let timerInterval = null;
  let isRunning = false;

  const timerDisplay = document.getElementById('timerDisplay');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  function updateTimerDisplay() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }

  function completePomodoro() {
    if (timeLeft === 0) {
      addPlantToGarden();
      timeLeft = 25 * 60;
      updateTimerDisplay();
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        isRunning = false;
      }
    }
  }

  function startTimer() {
    if (timerInterval) return;
    isRunning = true;
    timerInterval = setInterval(() => {
      if (timeLeft > 0) {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft === 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          completePomodoro();
        }
      }
    }, 1000);
  }

  function pauseTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
    }
  }

  function resetTimer() {
    pauseTimer();
    timeLeft = 25 * 60;
    updateTimerDisplay();
  }

  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', pauseTimer);
  resetBtn.addEventListener('click', resetTimer);

  // ---------- GARDEN WITH LOCALSTORAGE ----------
  const GARDEN_KEY = 'pixel_pomodoro_garden';
  let gardenPlants = []; // boolean array
  const MAX_PLANTS = 16;
  const gardenGrid = document.getElementById('gardenGrid');

  // cute pixel plant sprites (different per index)
  const plantSprites = [
    '🌱','🌿','🍃','🌸','🌻','🍓','🍄','🌼',
    '🌺','🍀','🌵','🎋','🍂','✨','💚','🍎'
  ];

  function saveGarden() {
    localStorage.setItem(GARDEN_KEY, JSON.stringify(gardenPlants));
  }

  function loadGarden() {
    const saved = localStorage.getItem(GARDEN_KEY);
    if (saved) {
      gardenPlants = JSON.parse(saved);
    } else {
      gardenPlants = new Array(MAX_PLANTS).fill(false);
    }
    renderGarden();
  }

  function renderGarden() {
    gardenGrid.innerHTML = '';
    for (let i = 0; i < MAX_PLANTS; i++) {
      const plot = document.createElement('div');
      plot.classList.add('plot');
      if (gardenPlants[i]) {
        plot.classList.add('has-plant');
        plot.textContent = plantSprites[i % plantSprites.length];
      } else {
        plot.textContent = '🟫'; // pixel dirt
        plot.style.opacity = '0.7';
      }
      gardenGrid.appendChild(plot);
    }
  }

  function addPlantToGarden() {
    const emptyIndex = gardenPlants.findIndex(has => has === false);
    if (emptyIndex !== -1) {
      gardenPlants[emptyIndex] = true;
      saveGarden();
      renderGarden();
    } else {
      const infoDiv = document.querySelector('.info-text');
      const original = infoDiv.innerHTML;
      infoDiv.innerHTML = '🎉 GARDEN FULL! Clear it to grow more 🎉';
      setTimeout(() => { infoDiv.innerHTML = original; }, 3000);
    }
  }

  function resetGarden() {
    gardenPlants = new Array(MAX_PLANTS).fill(false);
    saveGarden();
    renderGarden();
  }

  document.getElementById('resetGardenBtn').addEventListener('click', resetGarden);
  loadGarden();
  updateTimerDisplay();
</script>
</body>
</html>
